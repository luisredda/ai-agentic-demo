rules:
  - id: demo-bank-sql-injection
    message: "Demo finding: SQL query appears to be built using string concatenation with user-controlled input."
    languages: [python]
    severity: ERROR
    mode: taint
    pattern-sources:
      - pattern: $SQL + $INPUT
    pattern-sinks:
      - pattern: $DB.execute(...)

  - id: demo-bank-command-injection
    message: "Demo finding: a shell command is executed with a dynamically constructed command string."
    languages: [python]
    severity: ERROR
    pattern-either:
      - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
      - pattern: subprocess.run($CMD, ..., shell=True, ...)
      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
      - pattern: subprocess.call($CMD, ..., shell=True, ...)
      - pattern: os.system($CMD)

  - id: demo-bank-path-traversal
    message: "Demo finding: file path is built from user-controlled request input."
    languages: [python]
    severity: ERROR
    pattern-either:
      - pattern: send_file(os.path.join($BASE, request.args.get(...)), ...)
      - pattern: send_file(os.path.join($BASE, request.args[$PARAM]), ...)
      - pattern: open(os.path.join($BASE, request.args.get(...)), ...)
      - pattern: open(os.path.join($BASE, request.args[$PARAM]), ...)

  - id: demo-bank-ssrf
    message: "Demo finding: outbound HTTP request uses a user-controlled URL."
    languages: [python]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: requests.get($URL, ...)
          - pattern: httpx.get($URL, ...)
      - pattern-not: requests.get("...", ...)
      - pattern-not: httpx.get("...", ...)

  - id: demo-bank-hardcoded-secret
    message: "Demo finding: hardcoded secret-like value detected. Use Harness secrets or environment variables instead."
    languages: [python]
    severity: WARNING
    pattern-regex: '(JWT_SECRET|API_KEY|ACCESS_TOKEN|PRIVATE_KEY)\s*=\s*["''][^"'']{8,}["'']'

  - id: demo-bank-reflected-xss
    message: "Demo finding: response appears to reflect request query data directly into HTML."
    languages: [python]
    severity: WARNING
    # Matches the VULN-006 pattern: raw request.args value concatenated into an
    # HTML string literal that is returned to the client.
    patterns:
      - pattern-regex: '"<[^"]*"\s*\+\s*request\.args'
      - pattern-inside: |
          def $F(...):
            ...

  - id: demo-bank-insecure-cors
    message: "Demo finding: CORS allows all origins. Restrict origins for production applications."
    languages: [python]
    severity: WARNING
    pattern-either:
      - pattern: CORS($APP, origins="*")
      - pattern: CORS($APP, origins=["*"])
