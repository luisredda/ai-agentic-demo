apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}

spec:
  replicas: {{ .Values.replicas }}

  # Demo: fail the rollout if pods never become ready, but allow time for the
  # container to start (image pull, pip deps, SQLite init) before giving up.
  progressDeadlineSeconds: 60
  minReadySeconds: 0

  selector:
    matchLabels:
      app: {{ .Values.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        harness.io/rollout-id: "{{ .Values.rolloutId }}"

    spec:
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.containerPort }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          # FIX: Corrected readinessProbe path from /healthz to /health.
          # The application exposes /health endpoint, not /healthz.
          # Timings below give the container ~30s to start before readiness
          # checks begin, allowing a normal boot without timing out.
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
