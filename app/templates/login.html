<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} - Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="demo-banner">
    ⚠️ DEMO ONLY — This app is intentionally vulnerable. Not for production use.
  </div>

  <main class="container">
    <div class="login-card">
      <div class="login-header">
        <h1>{{ app_name }}</h1>
        <p>Demo Login — any credentials accepted</p>
      </div>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" class="form-control"
            placeholder="demo-user" value="demo-user">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" class="form-control"
            placeholder="demo-password" value="demo-password">
        </div>

        <button type="submit" class="btn-primary btn-full">Sign In</button>
      </form>

      <p class="login-note">No real authentication — demo only.</p>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
