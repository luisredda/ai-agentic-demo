[pytest]
# Harness Test Intelligence consumes a JUnit XML report. TI instruments the
# pytest run (via its python agent) and correlates these results back to the
# changed files. Emit the report to a stable path the pipeline step can pick up.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = --junitxml=test-results/junit.xml -v
