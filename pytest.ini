[pytest]
# Harness Test Intelligence consumes a JUnit XML report. TI instruments the
# pytest run (via its python agent) and correlates these results back to the
# changed files. Emit the report to a stable path the pipeline step can pick up.
#
# pythonpath adds the repo root to sys.path so `import app` resolves regardless
# of how pytest is launched. Harness TI runs the `pytest` console script (not
# `python -m pytest`), which does NOT add the cwd — without this the tests fail
# with ModuleNotFoundError: No module named 'app'.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = --junitxml=test-results/junit.xml -v
